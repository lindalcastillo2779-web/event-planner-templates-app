name: Generate database code

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'events_app/lib/data/app_database.dart'
      - 'events_app/pubspec.yaml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: events_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Commit generated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/data/app_database.g.dart
          if git diff --cached --quiet; then
            echo "Already up to date."
          else
            git commit -m "chore: generate drift database code [skip ci]"
            git push
          fi

      - run: flutter analyze

      - run: flutter test
